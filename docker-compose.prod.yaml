services:
  outline:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: goka-outline-base
    image: outline-local:prod
    env_file:
      - ./docker.env
    depends_on:
      - postgres
      - redis
    ports:
      - "80:80"
    volumes:
      - storage-data:/var/lib/outline/data
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    command:
      - redis-server
      - --maxmemory 512mb
      - --maxmemory-policy allkeys-lru
      - --save ""
      - --appendonly no
    volumes:
      - ./redis.conf:/redis.conf
      - redis-data:/data
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: unless-stopped

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: outline
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M
    user: "postgres:postgres"
    restart: unless-stopped

volumes:
  storage-data:
  redis-data:
