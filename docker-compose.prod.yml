# Redisを永続化したい場合は--saveと--appendonlyを削除
# 実行前に .env で SECRET_KEY と UTILS_SECRET を設定してください（README.prod.md 参照）

services:
  outline:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      URL: ${URL:-http://localhost:3000}
      PORT: "3000"
      DATABASE_URL: postgres://user:pass@postgres:5432/outline
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY を .env に設定してください}
      UTILS_SECRET: ${UTILS_SECRET:?UTILS_SECRET を .env に設定してください}
      FILE_STORAGE: local
      FILE_STORAGE_LOCAL_ROOT_DIR: /var/lib/outline/data
    volumes:
      - outline-data:/var/lib/outline/data
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    user: "redis:redis"
    command:
      - redis-server
      - --maxmemory 512mb
      - --maxmemory-policy allkeys-lru
      - --save ""
      - --appendonly no
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  postgres:
    image: postgres:16
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: outline
    user: "postgres:postgres"
    command:
      - postgres
      - -c shared_buffers=512MB
      - -c effective_cache_size=1536MB
      # 同時実行数でメモリ使用量が増えるので、同時接続が多ければ8MBへ
      - -c work_mem=16MB
      - -c maintenance_work_mem=128MB
      - -c max_connections=80
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M

volumes:
  outline-data:
